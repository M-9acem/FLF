# Experiments configuration for run_all_mixing_methods.py
#
# Usage:
#   python run_all_mixing_methods.py --experiments_yaml experiments.yaml
#
# Each experiment entry can override any of the defaults below.
# Defaults (if a key is omitted):
#   num_clients: 40
#   rounds: 200
#   epochs: 2
#   gossip_steps: 1
#   gossip_schedule: null
#   dataset: cifar10
#   model: resnet8
#   main_link_prob: 1.0
#   border_link_prob: 1.0
#   intra_cluster_prob: 0.8
#   topology_file: null   (auto-generated as shared_topology_<name>.pkl)
#   init_weights: null    (auto-resolved as init_weights/<model>_w0.pt)
#   partition_file: null  (auto-resolved as data_partition/<dataset>_N<n>_dirichlet_a0.5.pkl)
#   methods: null         (null = run all 5 methods)

experiments:

  # ── Max Degree + Jaccard Similarity only, N=40, fixed gossip steps/round ──
  - name: N40_gossip9
    num_clients: 40
    rounds: 400
    epochs: 2
    delay_d: 5
    gossip_steps: 9
    dataset: cifar10
    model: resnet8
    methods: [max_degree, jaccard]

  # ── Max Degree + Jaccard Similarity only, N=40
  - name: N40_gossip10
    num_clients: 40
    rounds: 400
    epochs: 2
    delay_d: 5
    gossip_steps: 10 
    dataset: cifar10
    model: resnet8
    methods: [max_degree, jaccard]

  - name: N40_gossip15
    num_clients: 40
    rounds: 400
    epochs: 2
    delay_d: 5
    gossip_steps: 15
    dataset: cifar10
    model: resnet8
    methods: [max_degree, jaccard]


  - name: N40_gossip20
    num_clients: 40
    rounds: 400
    epochs: 2
    delay_d: 5
    gossip_steps: 20
    dataset: cifar10
    model: resnet8
    methods: [max_degree, jaccard]

  - name: N40_gossip21
    num_clients: 40
    rounds: 400
    epochs: 2
    delay_d: 5
    gossip_steps: 21
    dataset: cifar10
    model: resnet8
    methods: [max_degree, jaccard]
